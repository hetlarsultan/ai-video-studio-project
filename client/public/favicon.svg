<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#0f172a" rx="40"/>
  
  <!-- Gradient border -->
  <rect width="200" height="200" fill="none" stroke="url(#grad1)" stroke-width="3" rx="40" opacity="0.8"/>
  
  <!-- Film reel -->
  <circle cx="70" cy="100" r="35" fill="none" stroke="url(#grad1)" stroke-width="2.5" opacity="0.6"/>
  <circle cx="70" cy="100" r="28" fill="none" stroke="url(#grad1)" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Film reel spokes -->
  <g stroke="url(#grad1)" stroke-width="1.5" opacity="0.5">
    <line x1="70" y1="65" x2="70" y2="50"/>
    <line x1="95" y1="100" x2="110" y2="100"/>
    <line x1="70" y1="135" x2="70" y2="150"/>
    <line x1="45" y1="100" x2="30" y2="100"/>
  </g>
  
  <!-- Play button (triangle) -->
  <polygon points="130,80 130,120 160,100" fill="url(#grad1)" filter="url(#shadow)"/>
  
  <!-- AI neural network nodes -->
  <g fill="url(#grad1)" opacity="0.7">
    <circle cx="145" cy="65" r="3"/>
    <circle cx="165" cy="75" r="2.5"/>
    <circle cx="170" cy="95" r="3"/>
    <circle cx="160" cy="115" r="2.5"/>
  </g>
  
  <!-- Neural network connections -->
  <g stroke="url(#grad1)" stroke-width="1" opacity="0.5">
    <line x1="145" y1="65" x2="165" y2="75"/>
    <line x1="165" y1="75" x2="170" y2="95"/>
    <line x1="170" y1="95" x2="160" y2="115"/>
    <line x1="160" y1="115" x2="145" y1="65"/>
  </g>
  
  <!-- Digital wave pattern at bottom -->
  <g stroke="url(#grad1)" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M 30 150 Q 40 140 50 150 T 70 150 T 90 150 T 110 150 T 130 150 T 150 150 T 170 150"/>
  </g>
</svg>
